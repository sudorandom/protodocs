front_page_markdown: |
  # Welcome to ProtoDocs 🚀

  **ProtoDocs** is a premium, client-side interactive documentation explorer for Protocol Buffer (Protobuf) schemas. Instead of relying on static HTML generation steps or IDE-bound codebases, ProtoDocs translates compiled binary descriptors or live server reflection maps into human-readable, cross-linked, and syntax-highlighted specifications. The project is open-source and hosted on [GitHub](https://github.com/sudorandom/protodocs).

  ProtoDocs provides a rich interactive interface to:
  - **Browse Files & Packages**: Clean directory hierarchy merging common path prefixes.
  - **Analyze Services & RPCs**: Renders service signatures (streaming, unary) alongside custom method options.
  - **Inspect Messages, Enums & Custom Options**: Renders structured types with interactive type links, oneof declarations, and nested custom options with full comment support.
  - **Go to Definition & Find References**: Pin tooltips to jump directly to type declarations and find all usages across loaded files.
  - **Interactive Syntax Help**: Every Protobuf keyword has interactive tooltips describing what it does, with direct links to the official Protobuf documentation.
  - **Interactive 'Try it out!' Client**: Send live gRPC-Web and Connect RPC requests to target services directly from the browser, with full support for streaming calls.
  - **Dynamic CLI Command Snippets**: Generates ready-to-use Connect and gRPC `curl` or `buf curl` command line snippets based on your active input parameters.
  - **Customizable Themes**: Toggle between Light, Dark, and Cyberpunk color schemes that synchronize with system preferences.

  ---

  ### Core Schema Definitions
  Explore the core definitions of Protocol Buffers by visiting the [google/protobuf/descriptor.proto](/#/files/google/protobuf/descriptor.proto) file, where all custom options, messages, enums, and compiler settings are defined.

  ---

  ## How It Works

  ProtoDocs runs entirely in your browser as a single-page static application. It parses Protobuf schema metadata at runtime using two methods:

  1. **Configuration & Discovery**: Reads inputs from `config.yaml` or URL search query parameters.
  2. **Schema Ingestion**:
     - **HTTP Loading**: Fetches compiled binary descriptor sets (`.binpb`) from configured URLs.
     - **Live Server Reflection**: Communicates directly with gRPC/Connect servers using Server Reflection APIs.
  3. **Registry Compilation**: Compiles all schemas into an in-memory `FileRegistry` to enable definition lookups, hover tooltips, and type reference searches.
  4. **Interactive UI**: Renders the complete schema hierarchy dynamically.

  ### 1. Zero-Compile Loading Layer
  - **HTTP Mode**: Loads one or more binary File Descriptor Sets (`.binpb` or `.pb` files generated by `buf build` or `protoc`).
  - **Live Reflection Mode**: Connects directly to a service endpoint using **gRPC-Web Reflection** or **Connect Reflection** to query schemas dynamically in real-time.

  ### 2. Runtime Indexing & Cross-Linking
  All loaded schemas are registered into a unified `@bufbuild/protobuf` registry. We compile a runtime symbol dictionary of every service, message, enum, and extension. This enables:
  - **Type Hover Tooltips**: Hover over custom types to view their descriptions and package scopes.
  - **Go to Definition**: Jump directly to a message or enum definition by clicking its type name.
  - **Find References**: Search across all loaded packages to see where a specific message is used as a field type or an RPC request/response type.

  ---

  *Select a file or service on the sidebar to explore the schema!*
