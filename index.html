<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preload config.yaml so the browser fetches it during HTML parse (static hosting) -->
    <!-- When served by the Go handler, window.__PROTODOCS_CONFIG__ is injected instead -->
    <link rel="preload" href="./config.yaml" as="fetch" crossorigin>
    <meta name="description" content="ProtoDocs - Protocol Buffers documentation viewer and interactive RPC tester." />
    <meta property="og:site_name" content="ProtoDocs" />
    <meta property="og:title" content="ProtoDocs — Protocol Buffers Documentation Browser" />
    <meta property="og:description" content="A modern Protocol Buffers documentation viewer and interactive RPC tester." />
    <meta property="og:image" content="./logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProtoDocs — Protocol Buffers Documentation Browser" />
    <meta name="twitter:description" content="A modern Protocol Buffers documentation viewer and interactive RPC tester." />
    <meta name="twitter:image" content="./logo.png" />
    <title>protodocs.dev</title>
    <style>
      /* Pre-React spinner: only shown while #root has no React content */
      body.loading {
        margin: 0;
        background-color: #0f172a;
      }
      body.loading #root {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loading-container {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        border: 3px solid #3b82f6;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 0.875rem;
        font-weight: 500;
        color: #94a3b8;
        font-family: ui-monospace, monospace;
      }
    </style>
    <script>
      /* Apply saved theme to <html> before first paint to prevent flash */
      (function() {
        try {
          var saved = localStorage.getItem('protodocs_theme');
          var theme = 'dark';
          if (saved === 'light' || saved === 'cyberpunk') {
            theme = saved;
          } else if (!saved && window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'light';
          }
          document.documentElement.classList.add('theme-' + theme);
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="loading">
    <div id="root">
        <div class="loading-container">
            <div class="spinner"></div>
            <span class="loading-text">Loading...</span>
        </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
