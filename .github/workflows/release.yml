name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup mise
      uses: jdx/mise-action@v2

    - name: Install dependencies
      run: pnpm install

    - name: Run Package (Builds app and bundles static tar.gz)
      run: pnpm package

    - name: Build CLI Binaries
      run: just build-cli

    - name: Package CLI Archives
      shell: bash
      run: |
        set -euo pipefail
        rm -rf release cli-archives
        mkdir -p release cli-archives
        cp protodocs-static.tar.gz release/

        for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
          mkdir -p "cli-archives/protodocs-cli-${target}"
          cp "bin/protodocs-cli-${target}" "cli-archives/protodocs-cli-${target}/protodocs"
          tar -czf "release/protodocs-cli-${target}.tar.gz" -C "cli-archives/protodocs-cli-${target}" protodocs
        done

        mkdir -p cli-archives/protodocs-cli-windows-amd64
        cp bin/protodocs-cli-windows-amd64.exe cli-archives/protodocs-cli-windows-amd64/protodocs.exe
        (cd cli-archives/protodocs-cli-windows-amd64 && zip -q "../../release/protodocs-cli-windows-amd64.zip" protodocs.exe)

    - name: Generate Checksums
      shell: bash
      run: |
        cd release
        shasum -a 256 * > SHA256SUMS.txt

    - name: Upload Static Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: protodocs-static-package
        path: release/protodocs-static.tar.gz
        if-no-files-found: error

    - name: Upload CLI Binaries Artifact
      uses: actions/upload-artifact@v4
      with:
        name: protodocs-cli-archives
        path: |
          release/protodocs-cli-*
          release/SHA256SUMS.txt
        if-no-files-found: error

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        platforms: linux/amd64,linux/arm64
        tags: |
          sudorandom/protodocs:latest
          sudorandom/protodocs:${{ github.sha }}
          sudorandom/protodocs:${{ github.ref_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          release/protodocs-static.tar.gz
          release/protodocs-cli-*
          release/SHA256SUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: protodocs-desktop-darwin-universal.dmg
          - os: windows-latest
            platform: windows/amd64
            artifact_name: protodocs-desktop-windows-amd64.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: protodocs-desktop-linux-amd64.tar.gz
            build_tags: webkit2_41
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup mise
      uses: jdx/mise-action@v2

    - name: Install Linux GTK dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

    - name: Install dependencies
      run: pnpm install

    - name: Build frontend for desktop
      run: pnpm build:desktop

    - name: Sync desktop version metadata
      run: node scripts/sync-version.mjs

    - name: Build Wails App (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cd desktop
        go tool wails build -platform ${{ matrix.platform }} -clean -tags "${{ matrix.build_tags }}"

    - name: Build Wails App
      if: matrix.os != 'ubuntu-latest'
      shell: bash
      run: |
        cd desktop
        go tool wails build -platform ${{ matrix.platform }} -clean

    - name: Package Desktop Artifact (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        bash scripts/create-macos-dmg.sh desktop/build/bin/ProtoDocs.app "${{ matrix.artifact_name }}"

    - name: Package Desktop Artifact (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Compress-Archive -Path desktop/build/bin/ProtoDocs.exe -DestinationPath ${{ matrix.artifact_name }}

    - name: Package Desktop Artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cd desktop/build/bin
        tar -czf ../../../${{ matrix.artifact_name }} ProtoDocs

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
